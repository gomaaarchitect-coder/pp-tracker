<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PP Tracker">
<meta name="theme-color" content="#0b0e14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Push / Pull Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#0b0e14;--surface:#13171f;--surface2:#1a1f2b;--border:#252d3d;--border2:#2f3a4e;
  --text:#e2e8f0;--text2:#7a8494;--text3:#525c6e;
  --accent:#6ea8fe;--accent2:#4ade80;--orange:#fb923c;--red:#f87171;--purple:#c084fc;--yellow:#facc15;--cyan:#22d3ee;
  --push:#6ea8fe;--pull:#4ade80;
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:620px;margin:0 auto;padding:16px;padding-bottom:110px}

.header{text-align:center;padding:20px 0 14px}
.header h1{font-family:'Space Mono',monospace;font-size:19px;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--push),var(--pull));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{font-size:11px;color:var(--text2);margin-top:3px;font-family:'Space Mono',monospace;letter-spacing:.5px}

.tabs{display:flex;gap:2px;background:var(--surface);border-radius:var(--radius);padding:3px;margin-bottom:14px;border:1px solid var(--border)}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:var(--text2);background:transparent;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff}

.week-nav{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.week-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .15s}
.week-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.week-bar{display:flex;gap:4px;flex:1}
.week-dot{flex:1;height:6px;border-radius:3px;background:var(--border);position:relative;cursor:pointer;transition:background .15s}
.week-dot:hover{background:var(--border2)}
.week-dot.done{background:var(--accent2)}
.week-dot.today{background:var(--accent);box-shadow:0 0 8px rgba(110,168,254,.4)}
.week-dot.selected{box-shadow:0 0 0 2px var(--orange)}
.week-dot-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-family:'Space Mono',monospace;color:var(--text2);white-space:nowrap}

.today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.today-card.push::before{background:linear-gradient(90deg,var(--push),var(--purple))}
.today-card.pull::before{background:linear-gradient(90deg,var(--pull),var(--yellow))}
.today-card.rest::before{background:linear-gradient(90deg,var(--text2),var(--border))}
.today-label{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:4px}
.today-title{font-size:22px;font-weight:700;margin-bottom:4px}
.today-type{font-size:10px;font-weight:500;margin-bottom:10px;display:inline-block;padding:2px 10px;border-radius:20px;font-family:'Space Mono',monospace}
.today-type.push-type{background:rgba(110,168,254,.12);color:var(--push)}
.today-type.pull-type{background:rgba(74,222,128,.12);color:var(--pull)}
.today-type.rest-type{background:rgba(122,132,148,.12);color:var(--text2)}
.today-meta{display:flex;gap:14px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.today-meta span{display:flex;align-items:center;gap:4px}
.past-badge{display:inline-block;background:rgba(251,146,60,.15);color:var(--orange);font-size:10px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:12px;margin-left:8px}

.workout-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;animation:fadeIn .25s ease-out}
.section-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.section-header h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-tag{font-family:'Space Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:1px}
.tag-push{background:rgba(110,168,254,.1);color:var(--push)}
.tag-pull{background:rgba(74,222,128,.1);color:var(--pull)}
.tag-acc{background:rgba(250,204,21,.1);color:var(--yellow)}
.tag-fin{background:rgba(248,113,113,.1);color:var(--red)}
.tag-warm{background:rgba(34,211,238,.1);color:var(--cyan)}
.tag-cool{background:rgba(192,132,252,.1);color:var(--purple)}
.section-progress{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2)}
.section-body{padding:0 14px 14px}
.section-body.collapsed{display:none}

.exercise{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;transition:border-color .2s}
.exercise.completed{border-color:var(--accent2);background:rgba(74,222,128,.03)}
.exercise-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.exercise-name{font-size:13px;font-weight:600;flex:1}
.exercise-target{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);white-space:nowrap;margin-left:8px;margin-top:2px}
.exercise-notes{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.4}

.level-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.level-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(110,168,254,.07);border:1px solid rgba(110,168,254,.2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--accent);font-family:'Space Mono',monospace}
.level-badge .lvl-num{font-weight:700;font-size:12px}
.level-badge .lvl-name{color:var(--text2);font-size:10px}
.level-badge .lvl-sep{color:var(--border2)}
.lvl-progress-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.lvl-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.lvl-progress-bar.full{background:var(--accent2)}
.lvl-progress-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text2);white-space:nowrap}

.sets-row{display:flex;gap:5px;flex-wrap:wrap}
.set-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 0;min-width:52px;flex:1;max-width:72px;cursor:pointer;transition:all .15s;color:var(--text2)}
.set-btn:hover{border-color:var(--accent)}
.set-btn.done{background:rgba(74,222,128,.08);border-color:var(--accent2);color:var(--accent2)}
.set-btn.maxed{background:rgba(110,168,254,.12);border-color:var(--accent);color:var(--accent)}
.set-label{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:1px}
.set-input{width:34px;background:transparent;border:none;color:inherit;font-family:'Space Mono',monospace;font-size:15px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}

.finisher-input{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.finisher-input label{font-size:12px;color:var(--text2);white-space:nowrap}
.finisher-input input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:17px;font-weight:700;outline:none;text-align:right;max-width:80px}

.check-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .15s;user-select:none}
.check-item:hover{border-color:var(--border2)}
.check-item.checked{border-color:var(--accent2);background:rgba(74,222,128,.03)}
.check-item.checked .check-box{background:var(--accent2);border-color:var(--accent2)}
.check-item.checked .check-box::after{opacity:1}
.check-item.checked .check-label{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--text3)}
.check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;position:relative;transition:all .15s}
.check-box::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:700;color:#111;opacity:0;transition:opacity .15s}
.check-label{font-size:13px;flex:1}
.check-detail{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace;white-space:nowrap}

.action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(19,23,31,.92);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;justify-content:center;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;flex:1;max-width:300px}
.btn-primary:hover{background:#93bfff}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border);color:var(--text)}

.date-picker-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px}
.date-picker-bar label{font-size:11px;color:var(--text2);white-space:nowrap;font-family:'Space Mono',monospace}
.date-picker-bar input[type="date"]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-xs);padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1;max-width:180px;cursor:pointer;color-scheme:dark}
.btn-today{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:var(--radius-xs);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:modalIn .25s ease}
.modal-icon{font-size:48px;margin-bottom:12px;line-height:1}
.modal-title{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--accent2)}
.modal-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.modal-detail{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.modal-from{font-size:12px;color:var(--text2);margin-bottom:4px}
.modal-arrow{font-size:20px;color:var(--accent2);margin:6px 0}
.modal-to{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{flex:1;padding:12px}
.btn-confirm{background:var(--accent2);color:#111;font-weight:700}
.btn-confirm:hover{background:#6ef0a0}
.btn-later{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-later:hover{background:var(--border);color:var(--text)}

.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.prog-card-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prog-card-sub{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.prog-chain-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:3px;cursor:pointer;transition:background .15s;font-size:12px;border:1px solid transparent}
.prog-chain-item:hover{background:var(--surface2)}
.prog-chain-item.active{background:rgba(110,168,254,.08);border-color:var(--accent)}
.prog-chain-item.past{color:var(--text2)}
.prog-chain-item.future{color:var(--text3);opacity:.7}
.prog-num{font-family:'Space Mono',monospace;font-size:10px;width:18px;text-align:center;color:var(--text2)}
.prog-chain-item.active .prog-num{color:var(--accent);font-weight:700}
.prog-chain-name{flex:1}
.prog-chain-reps{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2)}
.prog-chain-check{font-size:13px}

.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.history-card:hover{border-color:var(--accent)}
.history-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:3px}
.history-title{font-size:14px;font-weight:600;margin-bottom:5px}
.history-stats{display:flex;gap:10px;flex-wrap:wrap}
.history-stat{font-size:11px;color:var(--text2)}
.history-stat strong{color:var(--accent2);font-family:'Space Mono',monospace}
.history-actions{display:flex;gap:6px;margin-top:8px}
.history-del{background:none;border:1px solid var(--border);color:var(--red);padding:3px 10px;border-radius:var(--radius-xs);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.history-del:hover{background:rgba(248,113,113,.1)}

.data-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.data-section h3{font-size:14px;font-weight:700;margin-bottom:8px}
.data-section p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}
.data-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.data-btn:hover{border-color:var(--accent)}
.data-btn.danger{color:var(--red)}
.data-btn.danger:hover{border-color:var(--red)}
input[type="file"]{display:none}

.rest-message{text-align:center;padding:36px 20px}
.rest-emoji{font-size:44px;margin-bottom:14px}
.rest-title{font-size:18px;font-weight:700;margin-bottom:6px}
.rest-sub{color:var(--text2);font-size:13px;line-height:1.6}

.deload-banner{background:linear-gradient(135deg,rgba(250,204,21,.08),rgba(251,146,60,.06));border:1px solid rgba(250,204,21,.2);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;text-align:center}
.deload-banner h3{color:var(--yellow);font-size:13px;margin-bottom:3px}
.deload-banner p{color:var(--text2);font-size:11px}

.level-hint{font-size:11px;color:var(--text2);padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);line-height:1.6;margin-bottom:12px;border:1px solid var(--border)}
.level-hint strong{color:var(--accent)}

.week-start-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;text-align:center}
.week-start-banner p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.week-start-banner .btn-set-week{background:var(--orange);color:#111;font-weight:700;border:none;padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}

.install-banner{background:linear-gradient(135deg,rgba(110,168,254,.08),rgba(74,222,128,.06));border:1px solid rgba(110,168,254,.2);border-radius:var(--radius);padding:14px;margin-bottom:14px;text-align:center;display:none}
.install-banner.show{display:block}
.install-banner p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.install-banner .btn-install{background:var(--accent);color:#fff;font-weight:700;border:none;padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.install-banner .btn-dismiss{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;margin-left:10px;font-family:'DM Sans',sans-serif}

.toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#111;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;z-index:400;transition:top .3s ease;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{top:16px;top:calc(16px + env(safe-area-inset-top))}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// PWA SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════════
let deferredInstallPrompt = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => console.log('SW registration failed:', err));
}

// Listen for PWA install prompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show install banner
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.add('show');
});

function installApp() {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') showToast('App installed!');
      deferredInstallPrompt = null;
      const banner = document.getElementById('install-banner');
      if (banner) banner.classList.remove('show');
    });
  }
}

function dismissInstall() {
  deferredInstallPrompt = null;
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// PROGRESSION CHAINS
// ═══════════════════════════════════════════════════════════
const PROGS = {
  ring_pushup: { label: 'Ring Push-Up', icon: '⬤', levels: [
    { name: 'Incline Ring Push-Ups',        reps: '8–12', targetReps: 12, notes: 'Rings at waist height. Build stability.' },
    { name: 'Flat Ring Push-Ups',           reps: '5–8',  targetReps: 8,  notes: 'Full depth, rings at floor level.' },
    { name: 'Ring Push-Ups + RTO at Top',   reps: '5–8',  targetReps: 8,  notes: 'Turn rings out 45° at lockout.' },
    { name: 'Full RTO Ring Push-Ups',       reps: '5–8',  targetReps: 8,  notes: 'Rings turned out throughout.' },
    { name: 'Decline Ring Push-Ups',        reps: '5–8',  targetReps: 8,  notes: 'Feet elevated 15–30 cm.' },
    { name: 'Archer Ring Push-Ups',         reps: '4–6',  targetReps: 6,  notes: 'Unilateral overload, slow eccentric.' },
    { name: 'Pseudo-Planche Ring Push-Ups', reps: '4–6',  targetReps: 6,  notes: 'Hands by hips, lean forward.' },
    { name: 'Weighted Ring Push-Ups',       reps: '5–8',  targetReps: 8,  notes: 'Backpack 5–10 kg.' }
  ]},
  pullup: { label: 'Pull-Up', icon: '⬤', levels: [
    { name: 'Negative Pull-Ups (5s)',   reps: '5–8', targetReps: 8, notes: 'Jump up, lower 5 seconds.' },
    { name: 'Chin-Ups (supinated)',     reps: '5–8', targetReps: 8, notes: 'Full dead hang to chin over bar.' },
    { name: 'Pull-Ups (pronated)',      reps: '5–8', targetReps: 8, notes: 'Full ROM, elbows-to-hips cue.' },
    { name: 'Wide Pull-Ups',           reps: '5–8', targetReps: 8, notes: '1.5× shoulder width.' },
    { name: 'L-Sit Pull-Ups',          reps: '5–8', targetReps: 8, notes: 'Legs extended; tuck if needed.' },
    { name: 'Typewriter Pull-Ups',     reps: '3–5', targetReps: 5, notes: 'Pull up center, shift laterally.' },
    { name: 'Archer Pull-Ups',         reps: '3–5', targetReps: 5, notes: 'One arm assists.' },
    { name: 'Weighted Pull-Ups',       reps: '5–8', targetReps: 8, notes: 'Backpack 5–10 kg.' }

// ═══════════════════════════════════════════════════════════
// STATE & PERSISTENCE (localStorage)
// ═══════════════════════════════════════════════════════════
const DN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const LS_STATE = 'pp_v4_state';
const LS_LOG_PREFIX = 'pp_v4_log:';

let st = {
  currentTab: 'today',
  logs: {},
  programStartDate: null,
  levels: { ring_pushup: 1, pullup: 2, ring_dip: 3, ring_row: 1 },
  viewDate: null,
  collapsed: {}
};
let pendingProgression = null;

function dk(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const p = s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function dateFmt(d) { return DN[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate(); }
function todayStr() { return dk(new Date()); }

function getMondayOfWeek(dateStr) {
  const d = parseDate(dateStr);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return dk(mon);
}

function getProgramWeek(dateStr) {
  if (!st.programStartDate) return null;
  const start = parseDate(st.programStartDate);
  const current = parseDate(getMondayOfWeek(dateStr));
  const diffMs = current.getTime() - start.getTime();
  const diffWeeks = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
  return ((diffWeeks % 8) + 8) % 8 + 1;
}

// ── localStorage persistence ──
function saveState() {
  try {
    const stateOnly = { currentTab: st.currentTab, programStartDate: st.programStartDate, levels: st.levels, viewDate: st.viewDate, collapsed: st.collapsed };
    localStorage.setItem(LS_STATE, JSON.stringify(stateOnly));
  } catch(e) { console.error('Save state error:', e); }
}

function saveLog(dateStr) {
  try {
    const log = st.logs[dateStr];
    if (log) localStorage.setItem(LS_LOG_PREFIX + dateStr, JSON.stringify(log));
  } catch(e) { console.error('Save log error:', e); }
}

function deleteLogStorage(dateStr) {
  try { localStorage.removeItem(LS_LOG_PREFIX + dateStr); } catch(e) {}
}

function save(dateStr) {
  saveState();
  if (dateStr) saveLog(dateStr);
}

function loadAll() {
  try {
    const raw = localStorage.getItem(LS_STATE);
    if (raw) {
      const saved = JSON.parse(raw);
      st.currentTab = saved.currentTab || 'today';
      st.programStartDate = saved.programStartDate || null;
      st.levels = saved.levels || { ring_pushup: 1, pullup: 2, ring_dip: 3, ring_row: 1 };
      st.collapsed = saved.collapsed || {};
    }
    // Load all logs
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(LS_LOG_PREFIX)) {
        try {
          const dateStr = key.replace(LS_LOG_PREFIX, '');
          st.logs[dateStr] = JSON.parse(localStorage.getItem(key));
        } catch(e) {}
      }
    }
  } catch(e) { console.error('Load error:', e); }

  // Migrate from pp_v3 (old window.storage or localStorage format)
  try {
    const old = localStorage.getItem('pp_v3');
    if (old && Object.keys(st.logs).length === 0) {
      const o = JSON.parse(old);
      if (o.logs) {
        st.logs = o.logs;
        st.levels = o.levels || st.levels;
        if (o.programWeek && o.programWeek > 1 && !st.programStartDate) {
          const todayMon = getMondayOfWeek(todayStr());
          const startD = parseDate(todayMon);
          startD.setDate(startD.getDate() - (o.programWeek - 1) * 7);
          st.programStartDate = dk(startD);
        }
        saveState();
        for (const d of Object.keys(st.logs)) saveLog(d);
        showToast('Migrated data from v3');
      }
    }
  } catch(e) {}

  // Migrate from hv_v4
  try {
    const old = localStorage.getItem('hv_v4');
    if (old && Object.keys(st.logs).length === 0) {
      const o = JSON.parse(old);
      if (o.todayLog && !o.logs) {
        if (o.todayLog._date) st.logs[o.todayLog._date] = { ...o.todayLog };
        if (o.history) o.history.forEach(h => { if (h._date) st.logs[h._date] = { ...h }; });
        st.levels = o.levels || st.levels;
        saveState();
        for (const d of Object.keys(st.logs)) saveLog(d);
        showToast('Migrated data from HV tracker');
      }
    }
  } catch(e) {}

  if (!st.levels) st.levels = { ring_pushup: 1, pullup: 2, ring_dip: 3, ring_row: 1 };
  if (!st.collapsed) st.collapsed = {};
  st.viewDate = null;
}

// ── helpers ──
function getActiveDate() { return st.viewDate || todayStr(); }
function isViewingPast() { return st.viewDate && st.viewDate !== todayStr(); }
function getLog(date) { if (!st.logs[date]) st.logs[date] = { _date: date }; return st.logs[date]; }

function getSessionForDate(dateStr) {
  const d = parseDate(dateStr);
  const dow = d.getDay();
  if (dow === 0) return { type: 'rest', session: null, dayName: DN[dow] };
  const sessions = buildSessions(st.levels);
  const session = sessions.find(s => s.day === dow);
  const pw = getProgramWeek(dateStr);
  const isDeload = pw !== null && (pw === 4 || pw === 8);
  return { type: session.type, session, dayName: DN[dow], isDeload };
}

function getWeek() {
  const ref = parseDate(getActiveDate());
  const ts = todayStr();
  const mon = new Date(ref);
  mon.setDate(ref.getDate() - ((ref.getDay() + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const k = dk(d), isT = k === ts, isActive = k === getActiveDate();
    const log = st.logs[k];
    const done = log && Object.keys(log).filter(x => !x.startsWith('_')).length > 0;
    return { label: DS[d.getDay()], date: k, isToday: isT, isActive, done: !!done };
  });
}

function cntProg(session, dateStr) {
  if (!session) return { done: 0, total: 0 };
  const log = st.logs[dateStr] || {};
  const pw = getProgramWeek(dateStr);
  const dl = pw !== null && (pw === 4 || pw === 8);
  let d = 0, t = 0;
  session.pairs.forEach(p => p.exercises.forEach(ex => {
    const s = (dl && !ex.isFinisher) ? Math.min(2, ex.sets) : ex.sets;
    for (let i = 0; i < s; i++) { t++; if (log[ex.id + '_s' + i] !== undefined && log[ex.id + '_s' + i] !== '') d++; }
  }));
  return { done: d, total: t };
}

function pairProg(pair, dateStr) {
  const log = st.logs[dateStr] || {};
  const pw = getProgramWeek(dateStr);
  const dl = pw !== null && (pw === 4 || pw === 8);
  let d = 0, t = 0;
  pair.exercises.forEach(ex => {
    const s = (dl && !ex.isFinisher) ? Math.min(2, ex.sets) : ex.sets;
    for (let i = 0; i < s; i++) { t++; if (log[ex.id + '_s' + i] !== undefined && log[ex.id + '_s' + i] !== '') d++; }
  });
  return { done: d, total: t };
}

function countChecks(items, dateStr, prefix) {
  const log = st.logs[dateStr] || {};
  let done = 0;
  items.forEach(item => { if (log[prefix + item.id]) done++; });
  return { done, total: items.length };
}

function isSectionCollapsed(dateStr, sectionId) { return !!st.collapsed[dateStr + '_' + sectionId]; }

function toggleSection(dateStr, sectionId) {
  const key = dateStr + '_' + sectionId;
  st.collapsed[key] = !st.collapsed[key];
  saveState();
  const sy = window.scrollY; render(); window.scrollTo(0, sy);
}

// ═══════════════════════════════════════════════════════════
// AUTO-PROGRESSION
// ═══════════════════════════════════════════════════════════
function checkProgression(dateStr, exId, chain, numSets) {
  if (!chain) return;
  const currentLevel = st.levels[chain];
  const maxLevel = PROGS[chain].levels.length - 1;
  if (currentLevel >= maxLevel) return;
  const levelData = PROGS[chain].levels[currentLevel];
  const target = levelData.targetReps;
  const log = st.logs[dateStr] || {};
  let allMaxed = true, anyLogged = false;
  for (let i = 0; i < numSets; i++) {
    const val = log[exId + '_s' + i];
    if (val === undefined || val === '') { allMaxed = false; break; }
    anyLogged = true;
    if (parseInt(val) < target) { allMaxed = false; break; }
  }
  if (allMaxed && anyLogged && !pendingProgression) {
    pendingProgression = { chain, fromLevel: currentLevel, toLevel: currentLevel + 1 };
    showProgressionModal();
  }
}

function showProgressionModal() {
  if (!pendingProgression) return;
  const { chain, fromLevel, toLevel } = pendingProgression;
  const prog = PROGS[chain]; const from = prog.levels[fromLevel]; const to = prog.levels[toLevel];
  const existing = document.getElementById('prog-modal'); if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'prog-modal';
  overlay.innerHTML = `<div class="modal"><div class="modal-icon">🏆</div><div class="modal-title">Progression Unlocked!</div><div class="modal-sub">You've hit the target reps on all sets for<br><strong>${prog.label}</strong>.</div><div class="modal-detail">All sets at ${from.targetReps}+ reps — you've earned the next level.</div><div class="modal-from">Level ${fromLevel+1}: ${from.name}</div><div class="modal-arrow">↓</div><div class="modal-to">Level ${toLevel+1}: ${to.name} (${to.reps})</div><div class="modal-btns"><button class="btn btn-later" onclick="dismissProgression()">Not Yet</button><button class="btn btn-confirm" onclick="confirmProgression()">Level Up ✓</button></div></div>`;
  document.body.appendChild(overlay);
}

function confirmProgression() {
  if (!pendingProgression) return;
  const { chain, toLevel } = pendingProgression;
  st.levels[chain] = toLevel; pendingProgression = null; saveState(); dismissModal();
  showToast(PROGS[chain].label + ' → Level ' + (toLevel+1) + ': ' + PROGS[chain].levels[toLevel].name);
  render();
}
function dismissProgression() { pendingProgression = null; dismissModal(); }
function dismissModal() { const m = document.getElementById('prog-modal'); if (m) m.remove(); }

  else if (st.currentTab === 'levels') renderLevels(app);

}

function renderTabs() {
  return `<div class="tabs"><button class="tab ${st.currentTab==='today'?'active':''}" onclick="switchTab('today')">Workout</button><button class="tab ${st.currentTab==='levels'?'active':''}" onclick="switchTab('levels')">Levels</button><button class="tab ${st.currentTab==='history'?'active':''}" onclick="switchTab('history')">History</button><button class="tab ${st.currentTab==='data'?'active':''}" onclick="switchTab('data')">Data</button></div>`;
}

function renderChecklistSection(items, dateStr, prefix, tagClass, tagLabel, sectionTitle, sectionId) {
  const log = st.logs[dateStr] || {};
  const cnt = countChecks(items, dateStr, prefix);
  const collapsed = isSectionCollapsed(dateStr, sectionId);
  let h = `<div class="workout-section"><div class="section-header" onclick="toggleSection('${dateStr}','${sectionId}')"><h3><span class="section-tag ${tagClass}">${tagLabel}</span> ${sectionTitle}</h3><span class="section-progress">${cnt.done}/${cnt.total} ${collapsed?'▸':'▾'}</span></div><div class="section-body${collapsed?' collapsed':''}">`;
  items.forEach(item => {
    const key = prefix + item.id;
    const checked = !!log[key];
    h += `<div class="check-item ${checked?'checked':''}" onclick="toggleCheck('${dateStr}','${key}')"><div class="check-box"></div><span class="check-label">${item.label}</span><span class="check-detail">${item.detail}</span></div>`;
  });
  h += `</div></div>`;
  return h;
}

function renderToday(app) {
  const dateStr = getActiveDate();
  const { type, session, dayName, isDeload } = getSessionForDate(dateStr);
  const week = getWeek();
  const prog = cntProg(session, dateStr);
  const past = isViewingPast();
  const d = parseDate(dateStr);
  const pw = getProgramWeek(dateStr);
  const pwLabel = pw !== null ? `Week ${pw} of 8` : 'Week not set';
  const isDeloadLabel = pw !== null && (pw === 4 || pw === 8);

  let h = `<div class="header"><h1>PUSH / PULL TRACKER</h1><div class="subtitle">${pwLabel}${isDeloadLabel?' · DELOAD':''} · 6-Day Split</div></div>
  <div class="week-nav"><button class="week-nav-btn" onclick="navigateWeek(-1)">‹</button><div class="week-bar">${week.map(w => `<div class="week-dot ${w.done?'done':''} ${w.isToday?'today':''} ${w.isActive&&!w.isToday?'selected':''}" onclick="goToDate('${w.date}')"><span class="week-dot-label">${w.label}</span></div>`).join('')}</div><button class="week-nav-btn" onclick="navigateWeek(1)">›</button></div><div style="height:14px"></div>
  ${renderTabs()}
  <div id="install-banner" class="install-banner ${deferredInstallPrompt?'show':''}"><p>📱 Install this as an app on your device for offline access and a native experience.</p><button class="btn-install" onclick="installApp()">Install App</button><button class="btn-dismiss" onclick="dismissInstall()">Not now</button></div>
  <div class="date-picker-bar"><label>DATE</label><input type="date" value="${dateStr}" onchange="goToDate(this.value)">${past ? `<button class="btn-today" onclick="goToDate('${todayStr()}')">Today</button>` : ''}</div>
  <div class="today-card ${type}"><div class="today-label">${dateFmt(d)}</div><div class="today-title">${dayName}${past?'<span class="past-badge">PAST</span>':''}</div><span class="today-type ${type==='push'?'push-type':type==='pull'?'pull-type':'rest-type'}">${type==='push'?'↑ PUSH':type==='pull'?'↓ PULL':'☀ REST'}</span>${session?`<div class="today-meta"><span>⏱ ~30–40 min</span><span>✓ ${prog.done}/${prog.total} sets</span></div>`:''}</div>`;

  if (!st.programStartDate) {
    h += `<div class="week-start-banner"><p>Set the current week as <strong>Week 1</strong> to enable automatic week tracking and deloads.</p><button class="btn-set-week" onclick="setWeekOneHere()">📅 Set This Week as Week 1</button></div>`;
  }
  if (isDeload && type !== 'rest') h += `<div class="deload-banner"><h3>⚡ DELOAD WEEK</h3><p>2 sets instead of 3. Same intensity, less volume.</p></div>`;

  if (type === 'rest') {
    h += `<div class="rest-message"><div class="rest-emoji">🌿</div><div class="rest-title">Rest Day</div><div class="rest-sub">Complete rest from ring work. Do the posture routine below.</div></div>`;
    h += renderChecklistSection(COOLDOWN, dateStr, 'cd_', 'tag-cool', 'POSTURE', 'Daily Posture Routine', 'cooldown');
  } else {
    h += renderChecklistSection(WARMUPS[type] || [], dateStr, 'wu_', 'tag-warm', 'WARM-UP', type==='push' ? 'Push Warm-Up (4 min)' : 'Pull Warm-Up (4 min)', 'warmup');
    session.pairs.forEach(pair => {
      const pp = pairProg(pair, dateStr);
      const tc = pair.tag==='push'?'tag-push':pair.tag==='pull'?'tag-pull':pair.tag==='fin'?'tag-fin':'tag-acc';
      const sid = 'pair_' + pair.name.replace(/\s/g,'_');
      const collapsed = isSectionCollapsed(dateStr, sid);
      h += `<div class="workout-section"><div class="section-header" onclick="toggleSection('${dateStr}','${sid}')"><h3><span class="section-tag ${tc}">${pair.tagLabel}</span> ${pair.name}</h3><span class="section-progress">${pp.done}/${pp.total} ${collapsed?'▸':'▾'}</span></div><div class="section-body${collapsed?' collapsed':''}">`;
      pair.exercises.forEach(ex => { h += renderEx(ex, isDeload, dateStr); });
      h += `</div></div>`;
    });
    h += renderChecklistSection(COOLDOWN, dateStr, 'cd_', 'tag-cool', 'COOL-DOWN', 'Posture & Recovery (5 min)', 'cooldown');
  }

  const wkBtnLabel = pw !== null ? `Wk ${pw}` : 'Set Wk';
  h += `<div class="action-bar"><button class="btn btn-secondary" onclick="showWeekMenu()">${wkBtnLabel}</button><button class="btn btn-primary" onclick="finishWorkout()" ${prog.done===0&&type!=='rest'?'disabled':''}>${type==='rest'?'✓ Done':prog.done>=prog.total?'✓ Complete':'Save ('+prog.done+'/'+prog.total+')'}</button></div>`;
  app.innerHTML = h;
}

function renderEx(ex, deload, dateStr) {
  const log = st.logs[dateStr] || {};
  const actualSets = (deload && !ex.isFinisher) ? Math.min(2, ex.sets) : ex.sets;
  let allDone = true;
  for (let s = 0; s < actualSets; s++) { if (log[ex.id+'_s'+s] === undefined || log[ex.id+'_s'+s] === '') allDone = false; }
  let displayName = ex.name, displayReps = ex.reps, displayNotes = ex.notes;
  let levelBadgeHtml = '';
  if (ex.chain) {
    const chain = PROGS[ex.chain]; const lvl = st.levels[ex.chain] || 0; const levelData = chain.levels[lvl]; const target = levelData.targetReps;
    let setsMaxed = 0;
    for (let s = 0; s < actualSets; s++) { const val = log[ex.id+'_s'+s]; if (val !== undefined && val !== '' && parseInt(val) >= target) setsMaxed++; }
    const progressPct = Math.min(100, Math.round((setsMaxed/actualSets)*100));
    const isFull = setsMaxed >= actualSets;
    const isMaxLevel = lvl >= chain.levels.length - 1;
    levelBadgeHtml = `<div class="level-badge-row"><div class="level-badge"><span class="lvl-num">Lv${lvl+1}</span><span class="lvl-sep">·</span><span class="lvl-name">${chain.levels[lvl].name}</span></div>${!isMaxLevel?`<div class="lvl-progress-wrap" title="${setsMaxed}/${actualSets} sets at ${target}+ reps"><div class="lvl-progress-bar${isFull?' full':''}" style="width:${progressPct}%"></div></div><span class="lvl-progress-label">${setsMaxed}/${actualSets}</span>`:`<span class="lvl-progress-label" style="color:var(--accent2)">MAX LVL</span>`}</div>`;
  }
  let skillHtml = '';
  if (ex.skillPick && ex.skillOptions) {
    const chosen = log['_skill_' + ex.skillPick] || ex.skillOptions[0].value;
    const sel = ex.skillOptions.find(o => o.value === chosen) || ex.skillOptions[0];
    displayName = sel.label; displayReps = sel.reps; displayNotes = sel.notes;
    skillHtml = `<div class="level-badge-row" style="margin-bottom:8px"><span class="lvl-progress-label" style="white-space:nowrap;color:var(--text2)">VARIATION</span><select style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-xs);padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;outline:none" onchange="setSkillPick('${dateStr}','${ex.skillPick}',this.value)">${ex.skillOptions.map(o => `<option value="${o.value}" ${o.value===chosen?'selected':''}>${o.label} (${o.reps})</option>`).join('')}</select></div>`;
  }
  let setsHtml = '';
  if (ex.isFinisher) {
    const v = log[ex.id+'_s0'] || '';
    setsHtml = `<div class="finisher-input"><label>${displayReps==='MAX sec'?'Seconds:':'Reps:'}</label><input type="number" inputmode="numeric" value="${v}" placeholder="—" onchange="logSet('${dateStr}','${ex.id}',0,this.value,null,null)" onfocus="this.select()"></div>`;
  } else {
    const targetReps = ex.chain ? PROGS[ex.chain].levels[st.levels[ex.chain]||0].targetReps : null;
    setsHtml = '<div class="sets-row">';
    for (let s = 0; s < actualSets; s++) {
      const k = ex.id+'_s'+s, v = log[k]; const done = v !== undefined && v !== '';
      const maxed = done && targetReps !== null && parseInt(v) >= targetReps;
      setsHtml += `<div class="set-btn ${maxed?'maxed':done?'done':''}" onclick="this.querySelector('.set-input').focus()"><span class="set-label">Set ${s+1}</span><input class="set-input" type="number" inputmode="numeric" value="${v!==undefined?v:''}" placeholder="—" onchange="logSet('${dateStr}','${ex.id}',${s},this.value,'${ex.chain||''}',${actualSets})" onfocus="this.select()"></div>`;
    }
    setsHtml += '</div>';
  }
  return `<div class="exercise ${allDone?'completed':''}"><div class="exercise-top"><span class="exercise-name">${displayName}</span><span class="exercise-target">${actualSets}×${displayReps}</span></div>${levelBadgeHtml}${skillHtml}<div class="exercise-notes">${displayNotes}${ex.rest!=='—'?' | Rest: '+ex.rest:''}</div>${setsHtml}</div>`;
}

function renderLevels(app) {
  let h = `<div class="header"><h1>PUSH / PULL TRACKER</h1><div class="subtitle">Progression Levels</div></div>${renderTabs()}`;
  h += `<div class="level-hint">Move <strong>up or down freely</strong> to match your current ability. Auto-progression triggers during workouts when you hit all sets at the target reps.<br><br><strong>Rule:</strong> 3 × target reps (top of range) with good form and 1–2 RIR = advance one level.</div>`;
  Object.keys(PROGS).forEach(chain => {
    const p = PROGS[chain]; const lvl = st.levels[chain] || 0;
    h += `<div class="prog-card"><div class="prog-card-title">${p.label} Progression</div><div class="prog-card-sub">Current: <strong style="color:var(--accent)">Level ${lvl+1} — ${p.levels[lvl].name}</strong> · Target: ${p.levels[lvl].targetReps}+ reps/set</div>`;
    p.levels.forEach((l, i) => {
      const cls = i===lvl?'active':i<lvl?'past':'future';
      h += `<div class="prog-chain-item ${cls}" onclick="setLevelManual('${chain}',${i})"><span class="prog-num">${i+1}</span><span class="prog-chain-name">${l.name}</span><span class="prog-chain-reps">${l.reps}</span><span class="prog-chain-check">${i===lvl?'◉':i<lvl?'✓':'○'}</span></div>`;
    });
    h += `</div>`;
  });
  h += `<div style="height:20px"></div>`;
  app.innerHTML = h;
}

function renderHistory(app) {
  let h = `<div class="header"><h1>PUSH / PULL TRACKER</h1><div class="subtitle">Workout History</div></div>${renderTabs()}`;
  const dates = Object.keys(st.logs).filter(k => { const log = st.logs[k]; return Object.keys(log).filter(x => !x.startsWith('_')).length > 0; }).sort((a,b) => b.localeCompare(a));
  if (dates.length === 0) {
    h += `<div class="rest-message"><div class="rest-emoji">📝</div><div class="rest-title">No history yet</div><div class="rest-sub">Complete a workout to see it here.</div></div>`;
  } else {
    dates.forEach(dateStr => {
      const log = st.logs[dateStr];
      const sets = Object.keys(log).filter(k => !k.startsWith('_') && !k.startsWith('wu_') && !k.startsWith('cd_'));
      const reps = sets.reduce((s,k) => s + (parseInt(log[k]) || 0), 0);
      const wuCount = Object.keys(log).filter(k => k.startsWith('wu_') && log[k]).length;
      const cdCount = Object.keys(log).filter(k => k.startsWith('cd_') && log[k]).length;
      const pw = getProgramWeek(dateStr);
      const pwLabel = pw !== null ? `Wk ${pw}` : '';
      h += `<div class="history-card" onclick="goToDate('${dateStr}');switchTab('today')"><div class="history-date">${dateStr} · ${log._dayName||''}${pwLabel?' · '+pwLabel:''}</div><div class="history-title">${log._sessionName||'Workout'}</div><div class="history-stats"><span class="history-stat"><strong>${sets.length}</strong> sets</span><span class="history-stat"><strong>${reps}</strong> total reps</span>${wuCount?`<span class="history-stat">Warm-up: <strong>${wuCount}/5</strong></span>`:``}${cdCount?`<span class="history-stat">Cool-down: <strong>${cdCount}/4</strong></span>`:``}${log._finisher?`<span class="history-stat">Finisher: <strong>${log._finisher}</strong></span>`:``}</div><div class="history-actions"><button class="history-del" onclick="event.stopPropagation();deleteLog('${dateStr}')">Delete</button></div></div>`;
    });
  }
  h += `<div style="height:70px"></div>`;
  app.innerHTML = h;
}

function renderData(app) {
  const pw = getProgramWeek(todayStr());
  let h = `<div class="header"><h1>PUSH / PULL TRACKER</h1><div class="subtitle">Import & Export</div></div>${renderTabs()}`;
  h += `<div class="data-section"><h3>📅 Program Week</h3><p>${st.programStartDate?`Week 1 started on <strong>${st.programStartDate}</strong>. Current week: <strong>Week ${pw||'?'}</strong>.`:'No start date set yet.'}</p><div class="data-btns"><button class="data-btn" onclick="setWeekOneHere()">Set This Week as Week 1</button>${st.programStartDate?`<button class="data-btn" onclick="clearProgramStart()">Clear Start Date</button>`:''}</div></div>`;
  h += `<div class="data-section"><h3>📤 Export</h3><p>Download all workout data as a JSON backup.</p><div class="data-btns"><button class="data-btn" onclick="exportJSON()">⬇ Export JSON</button></div></div>`;
  h += `<div class="data-section"><h3>📥 Import</h3><p>Import data from a previous export. Merges with existing data.</p><div class="data-btns"><button class="data-btn" onclick="document.getElementById('importJSON').click()">⬆ Import JSON</button><input type="file" id="importJSON" accept=".json" onchange="importJSON(this)"></div></div>`;
  h += `<div class="data-section"><h3>⚙ Settings</h3><div class="data-btns"><button class="data-btn danger" onclick="confirmReset()">🗑 Reset All Data</button></div></div>`;
  const logCount = Object.keys(st.logs).filter(k => Object.keys(st.logs[k]).filter(x => !x.startsWith('_')).length > 0).length;
  h += `<div style="text-align:center;padding:20px;font-size:11px;color:var(--text3)">${logCount} workout${logCount!==1?'s':''} logged${st.programStartDate?' · Started '+st.programStartDate:''} · localStorage</div>`;
  app.innerHTML = h;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function logSet(dateStr, id, s, v, chain, numSets) {
  if (!st.logs[dateStr]) st.logs[dateStr] = { _date: dateStr };
  st.logs[dateStr][id+'_s'+s] = v === '' ? '' : (parseInt(v) || 0);
  saveLog(dateStr);
  if (chain && chain !== 'null' && chain !== '' && numSets) checkProgression(dateStr, id, chain, numSets);
  const sy = window.scrollY; render(); window.scrollTo(0, sy);
}

function toggleCheck(dateStr, key) {
  if (!st.logs[dateStr]) st.logs[dateStr] = { _date: dateStr };
  st.logs[dateStr][key] = !st.logs[dateStr][key];
  saveLog(dateStr);
  const sy = window.scrollY; render(); window.scrollTo(0, sy);
}

function setSkillPick(dateStr, skillKey, value) {
  if (!st.logs[dateStr]) st.logs[dateStr] = { _date: dateStr };
  st.logs[dateStr]['_skill_' + skillKey] = value;
  saveLog(dateStr);
  const sy = window.scrollY; render(); window.scrollTo(0, sy);
}

function switchTab(t) { st.currentTab = t; saveState(); render(); window.scrollTo(0, 0); }
function goToDate(dateStr) { st.viewDate = (dateStr === todayStr()) ? null : dateStr; st.currentTab = 'today'; saveState(); render(); }

function navigateWeek(offset) {
  const d = parseDate(getActiveDate()); d.setDate(d.getDate() + offset * 7); goToDate(dk(d));
}

function setWeekOneHere() {
  st.programStartDate = getMondayOfWeek(getActiveDate());
  saveState(); render(); showToast('Week 1 set → ' + st.programStartDate);
}

function clearProgramStart() { st.programStartDate = null; saveState(); render(); showToast('Program start date cleared'); }

function showWeekMenu() {
  if (!st.programStartDate) { setWeekOneHere(); return; }
  if (confirm('Reset Week 1 to the currently viewed week?\n\nCurrent start: ' + st.programStartDate)) setWeekOneHere();
}

function setLevelManual(chain, lvl) {
  st.levels[chain] = lvl; saveState();
  const sy = window.scrollY; render(); window.scrollTo(0, sy);
  showToast(PROGS[chain].label + ' → Level ' + (lvl+1) + ': ' + PROGS[chain].levels[lvl].name);
}

function finishWorkout() {
  const dateStr = getActiveDate();
  const { session, dayName, type } = getSessionForDate(dateStr);
  const log = getLog(dateStr);
  if (session) {
    log._sessionName = session.name; log._dayName = dayName; log._type = session.type;
    session.pairs.forEach(p => p.exercises.forEach(ex => { if (ex.isFinisher && log[ex.id+'_s0']) log._finisher = log[ex.id+'_s0']; }));
  } else { log._sessionName = 'Rest Day'; log._dayName = dayName; log._type = 'rest'; }
  saveLog(dateStr);
  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = '✓ Saved!'; btn.style.background = 'var(--accent2)'; btn.style.color = '#111'; setTimeout(render, 800); }
}

function deleteLog(dateStr) {
  if (confirm('Delete workout log for ' + dateStr + '?')) {
    delete st.logs[dateStr]; deleteLogStorage(dateStr); render(); showToast('Deleted ' + dateStr);
  }
}

function confirmReset() {
  if (confirm('This will delete ALL workout data. Are you sure?')) {
    if (confirm('Really? This cannot be undone.')) {
      // Clear all localStorage pp_v4 keys
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && (key.startsWith(LS_LOG_PREFIX) || key === LS_STATE)) toRemove.push(key);
      }
      toRemove.forEach(k => localStorage.removeItem(k));
      try { localStorage.removeItem('pp_v3'); localStorage.removeItem('pp_v2'); localStorage.removeItem('hv_v4'); } catch(e) {}
      st = { currentTab: 'today', logs: {}, programStartDate: null, levels: { ring_pushup: 1, pullup: 2, ring_dip: 3, ring_row: 1 }, viewDate: null, collapsed: {} };
      saveState(); render(); showToast('All data cleared');
    }
  }
}

function exportJSON() {
  const data = { version: 'pp_v4', exportDate: todayStr(), programStartDate: st.programStartDate, levels: st.levels, logs: st.logs };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'pushpull_tracker_' + todayStr() + '.json'; a.click();
  showToast('JSON exported');
}

function importJSON(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.logs) {
        let count = 0;
        for (const k of Object.keys(data.logs)) { if (!st.logs[k]) st.logs[k] = {}; Object.assign(st.logs[k], data.logs[k]); saveLog(k); count++; }
        if (data.levels) st.levels = { ...st.levels, ...data.levels };
        if (data.programStartDate) st.programStartDate = data.programStartDate;
        if (data.programWeek && !data.programStartDate && !st.programStartDate) {
          const todayMon = getMondayOfWeek(todayStr());
          const startD = parseDate(todayMon);
          startD.setDate(startD.getDate() - (data.programWeek - 1) * 7);
          st.programStartDate = dk(startD);
        }
        saveState(); render(); showToast(count + ' workouts imported');
      } else { showToast('Invalid JSON format'); }
    } catch(err) { showToast('Import error: ' + err.message); }
    input.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = '✓ ' + msg; t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, 2400);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadAll();
render();
</script>
</body>
</html>
